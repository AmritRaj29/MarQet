$kind: http-request
name: Login Shopkeeper
method: POST
url: '{{baseUrl}}/api/auth/login'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "shopkeeper@example.com",
      "password": "password123"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 OK", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Response has token", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("token");
        pm.collectionVariables.set("shopkeeperToken", json.token);
      });
      pm.test("Response has _id and email", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("_id");
        pm.expect(json).to.have.property("email");
      });
      pm.test("Role is shopkeeper", function () {
        const json = pm.response.json();
        pm.expect(json.role).to.eql("shopkeeper");
      });
      pm.test("Invalid credentials return 401", function () {
        if (pm.response.code === 401) {
          pm.expect(pm.response.json()).to.have.property("message");
        }
      });
