$kind: http-request
name: Get Nearby Shops
method: GET
url: '{{baseUrl}}/api/shops/nearby?lat=28.6139&lng=77.2090&radius=5'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 OK", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Response is an array", function () {
        pm.expect(pm.response.json()).to.be.an("array");
      });
      pm.test("Missing lat/lng returns 400", function () {
        if (pm.response.code === 400) {
          pm.expect(pm.response.json()).to.have.property("message");
        }
      });
      pm.test("Each shop has location field", function () {
        const shops = pm.response.json();
        if (shops.length > 0) {
          pm.expect(shops[0]).to.have.property("location");
        }
      });
