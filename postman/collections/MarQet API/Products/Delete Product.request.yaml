$kind: http-request
name: Delete Product
method: DELETE
url: '{{baseUrl}}/api/products/{{productId}}'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 OK", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Response confirms deletion", function () {
        const json = pm.response.json();
        pm.expect(json.message).to.include("removed");
      });
      pm.test("Unauthorized delete returns 403", function () {
        if (pm.response.code === 403) {
          pm.expect(pm.response.json().message).to.include("Not authorized");
        }
      });
      pm.test("Product not found returns 404", function () {
        if (pm.response.code === 404) {
          pm.expect(pm.response.json().message).to.include("not found");
        }
      });
