$kind: http-request
name: Update Product
method: PUT
url: '{{baseUrl}}/api/products/{{productId}}'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "price": 1799,
      "stock": 20,
      "discountPrice": 1299
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 OK", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Price is updated", function () {
        const json = pm.response.json();
        pm.expect(json.price).to.eql(1799);
      });
      pm.test("Unauthorized update returns 403", function () {
        if (pm.response.code === 403) {
          pm.expect(pm.response.json().message).to.include("Not authorized");
        }
      });
      pm.test("Product not found returns 404", function () {
        if (pm.response.code === 404) {
          pm.expect(pm.response.json().message).to.include("not found");
        }
      });
